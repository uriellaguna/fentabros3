<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1f1c2c, #928dab);
  margin: 0;
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 24px;
  font-weight: bold;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 10px;
}

.box, .post {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 12px;
  border-radius: 15px;
  margin-bottom: 15px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

textarea, input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
}

button {
  margin-top: 8px;
  padding: 8px;
  border-radius: 10px;
  border: none;
  background: #ff4b2b;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

.reactions span {
  margin-right: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.reactions span:hover {
  transform: scale(1.4);
}

.post {
  animation: aparecer 0.4s ease;
}

@keyframes aparecer {
  from {opacity:0; transform: translateY(15px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
